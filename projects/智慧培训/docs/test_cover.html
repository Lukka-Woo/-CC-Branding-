<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <title>企业培训平台增强建议书</title>
    <link rel="stylesheet" href="../../../templates/html/brand.css">
    <style>
        .cover {
            height: 297mm;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #ffffff 0%, #ffffff 72%, #fcfffe 100%);
            
    background-image: radial-gradient(circle at 85% 82%, rgba(62, 201, 158, .06), transparent 18%);
    
        }

        .cover__header {
            height: 44.3mm;
            padding: 12mm 31mm 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .cover__content {
            height: 152.6mm;
            padding: 0 31mm;
            display: flex;
            align-items: center;
            
        justify-content: flex-start;
        
        }

        .cover__footer {
            height: 49.2mm;
            padding: 0 31mm 12mm;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .cover__logo {
            width: 40.0mm;
            height: auto;
            margin-bottom: 6mm;
        }

        .cover__doc-type {
            font-size: 10pt;
            font-weight: 600;
            color: var(--color-primary-500);
            text-transform: uppercase;
            margin-bottom: 4mm;
            letter-spacing: 0.5px;
        }

        .cover__title {
            font-size: 28pt;
            font-weight: 700;
            color: var(--color-neutral-900);
            line-height: 1.1;
            margin-bottom: 8mm;
        }

        .cover__subtitle {
            font-size: 12pt;
            color: var(--color-neutral-400);
            font-family: var(--font-en);
            font-weight: 400;
        }

        .cover__illustration {
            max-width: 45mm;
            max-height: 60mm;
            object-fit: contain;
        }

        .cover__meta {
            text-align: right;
            font-size: 9pt;
            line-height: 1.4;
            margin-bottom: 6mm;
        }

        .cover__meta-item {
            margin: 1mm 0;
        }

        .cover__meta-label {
            font-weight: 600;
            color: var(--color-neutral-400);
        }

        .cover__meta-value {
            color: var(--color-neutral-700);
        }

        .cover__brand {
            font-size: 8pt;
            color: var(--color-neutral-400);
            border-top: 1px solid var(--color-primary-500);
            padding-top: 4mm;
        }

        .cover__rule {
            height: 1px;
            background: var(--color-primary-500);
            margin: 4mm 0;
        }
    </style>
</head>
<body>
    <div class="page cover">
        <div class="cover__header">
            <img src="../assets/logo-horizontal-primary.png" class="cover__logo" alt="Brand Logo">
            <div class="cover__doc-type">SOLUTION PROPOSAL</div>
            <div class="cover__rule"></div>
        </div>

        <div class="cover__content">
            <div><h1 class="cover__title">企业培训平台增强建议书</h1><div class="cover__subtitle">Enterprise Training Platform Enhancement Proposal</div></div>
        </div>

        <div class="cover__footer">
            <div class="cover__meta">
                    <div class="cover__meta-item">
                        <span class="cover__meta-label">客户</span>
                        <span class="cover__meta-value">维苏威高级陶瓷（中国）有限公司</span>
                    </div>
                
                    <div class="cover__meta-item">
                        <span class="cover__meta-label">版本</span>
                        <span class="cover__meta-value">V1.0</span>
                    </div>
                
                    <div class="cover__meta-item">
                        <span class="cover__meta-label">日期</span>
                        <span class="cover__meta-value">2026年6月</span>
                    </div>
                
                    <div class="cover__meta-item">
                        <span class="cover__meta-label">密级</span>
                        <span class="cover__meta-value">机密文件，仅供内部参考</span>
                    </div>
                </div>
            <div class="cover__brand">未来方舟（上海）科技有限公司</div>
        </div>
    </div>
</body>
</html>
